name: Build all LaTeX projects

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX projects
        uses: xu-cheng/latex-action@v3
        with:
          # Alle .tex Dateien in beiden Ordnern
          root_file: |
            *.tex
          working_directory: |
            Ausarbeitung
            Vortrag
          latexmk_use_xelatex: false
          continue_on_error: fals
