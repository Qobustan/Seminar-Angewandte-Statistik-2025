name: Build all LaTeX projects

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Compile LaTeX projects
        uses: xu-cheng/latex-action@v3
        with:
          root_file: |
            *.tex
          working_directory: |
            Ausarbeitung
            Vortrag
          continue_on_error: false
