name: Build all LaTeX projects

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build Ausarbeitung
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Ausarbeitung.tex
          working_directory: Ausarbeitung
          args: -f -gg

      - name: Build Vortrag
        uses: xu-cheng/latex-action@v3
        with:
          root_file: vortrag.tex
          working_directory: Vortrag
          args: -f -gg

      - name: List generated PDFs
        run: |
          echo "Ausarbeitung:"
          ls -lh Ausarbeitung/*.pdf || true
          echo "Vortrag:"
          ls -lh Vortrag/*.pdf || true
