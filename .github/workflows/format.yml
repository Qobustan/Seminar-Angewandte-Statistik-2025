name: Format LaTeX

on:
  workflow_dispatch:   # nur manuell starten

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch the full history so the push can be resolved correctly
          fetch-depth: 0

      - name: Install latexindent
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-extra-utils

      - name: Run latexindent
        run: |
          shopt -s globstar
          latexindent -w **/*.tex

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No formatting changes."
          else
            git commit -am "style: latexindent auto-formatting"
            git push || echo "::warning::Push failed – the branch may be protected. Please merge the formatting changes manually."
          fi
