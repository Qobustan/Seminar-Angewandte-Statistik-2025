name: Format LaTeX

on:
  workflow_dispatch:   # nur manuell starten

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install latexindent
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-extra-utils

      - name: Run latexindent
        run: |
          shopt -s globstar
          latexindent -w **/*.tex

      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || git commit -am "style: latexindent auto-formatting"
          git push
