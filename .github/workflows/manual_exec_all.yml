# .github/workflows/run-all-tasks.yml
name: Run all tasks (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ziel-Umgebung"
        type: choice
        required: true
        options:
          - dev
          - staging
          - prod
      skip_deploy:
        description: "Deployment überspringen?"
        type: boolean
        default: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Run lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Run unit tests
        run: npm test -- --ci

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm ci
      - name: Build artifacts
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: dist/

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip_deploy }}
    needs: [build]
    environment: ${{ inputs.environment }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: dist/
      - name: Deploy to ${{ inputs.environment }}
        run: |
          echo "Deploying to ${{ inputs.environment }}..."
          # Hier deinen echten Deploy-Befehl (z. B. CLI, SSH, Cloud, etc.)
