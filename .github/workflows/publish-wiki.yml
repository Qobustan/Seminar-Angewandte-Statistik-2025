name: Publish Wiki

on:
  push:
    branches: [main, master]
    paths:
      - 'wiki/**'
  workflow_dispatch:

jobs:
  publish-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Publish to Wiki
        uses: SwiftDocOrg/github-wiki-publish-action@8ba354c7a6ec10d21e1e1d2a0e1d3b40d7e74f49
        with:
          path: wiki
        env:
          GH_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
