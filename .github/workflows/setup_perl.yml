name: Setup Perl environment

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  setup-perl:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Perl and latexindent dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y perl cpanminus
          sudo cpanm --notest YAML::Tiny File::HomeDir Unicode::GCString

      - name: Verify Perl version
        run: perl --version
