name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@v2
        with:
          prompt: |
            Summarize the following GitHub issue in one paragraph:
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Comment with AI summary
        run: |
          # PREVENT INJECTION ATTACKS!
          # (With passing through an parameter unchecked input is always
          # considered as text and NEVER as CODE even and especially if it
          # is VALID code!)
          gh issue comment "$ISSUE_NUMBER" --body "$PARAMETER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESPONSE: ${{ steps.inference.outputs.response }}
          PARAMETER: ${{ steps.inference.outputs.response }}
